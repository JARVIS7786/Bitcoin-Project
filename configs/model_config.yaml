# Model Configuration for PrimeTRADE

# Model types
models:
  baseline:
    type: "LogisticRegression"
    params:
      max_iter: 1000
      class_weight: "balanced"

  xgboost:
    type: "XGBClassifier"
    params:
      max_depth: 6
      learning_rate: 0.1
      n_estimators: 100
      min_child_weight: 1
      subsample: 0.8
      colsample_bytree: 0.8
      objective: "binary:logistic"
      eval_metric: "auc"

  lightgbm:
    type: "LGBMClassifier"
    params:
      max_depth: 6
      learning_rate: 0.1
      n_estimators: 100
      num_leaves: 31
      subsample: 0.8
      colsample_bytree: 0.8
      objective: "binary"
      metric: "auc"

# Training parameters
training:
  test_size: 0.2
  validation_size: 0.1
  random_state: 42

  # Class imbalance handling
  handle_imbalance: true
  imbalance_method: "smote"  # smote, undersample, class_weight

# MLflow tracking
mlflow:
  experiment_name: "primetrade"
  tracking_uri: "experiments/mlruns"
  artifact_location: "experiments/artifacts"

# Evaluation metrics
evaluation:
  primary_metric: "roc_auc"
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc

# Logging
logging:
  level: "INFO"
  log_file: "logs/training_pipeline.log"
