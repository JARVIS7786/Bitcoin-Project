# Backtesting Configuration for PrimeTRADE

# Initial capital
capital:
  initial: 10000
  currency: "USD"

# Transaction costs
costs:
  maker_fee: 0.0002  # 0.02%
  taker_fee: 0.0005  # 0.05%
  slippage_bps: 5.0  # 5 basis points

# Position sizing
position_sizing:
  method: "fixed"  # fixed, kelly, risk_parity
  fixed_size: 1000
  max_position_size: 5000
  max_leverage: 10

# Risk management
risk:
  max_drawdown: 0.2  # 20%
  stop_loss: 0.05  # 5%
  take_profit: 0.15  # 15%

# Backtesting parameters
backtest:
  start_date: "2024-01-01"
  end_date: "2024-12-31"
  rebalance_frequency: "daily"

# Performance metrics
metrics:
  - total_return
  - sharpe_ratio
  - max_drawdown
  - win_rate
  - profit_factor
  - total_trades

# Logging
logging:
  level: "INFO"
  log_file: "logs/backtest_pipeline.log"
